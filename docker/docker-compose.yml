# docker-compose.yml
version: '3.8'

services:
  vamos:
    build: .
    image: vamos:latest
    container_name: vamos_container
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - QT_X11_NO_MITSHM=1
      - ROS_MASTER_URI=http://localhost:11311
    volumes:
      # Mount your local VAMOS repository
      - ../:/root/vamos
      # Data directory
      - /mnt/hdd2/UpGreatEarth/bags:/bags
      # X11 for GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    network_mode: host
    stdin_open: true
    tty: true
    # For GUI applications
    ipc: host
    command: bash

volumes:
  vamos_ws:
